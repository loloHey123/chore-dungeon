<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chores</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' rx='4' fill='%23111'/><path d='M4 8.5l2.5 2.5L12 5' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg>" />
</head>
<body>
  <!-- Login -->
  <div id="login" class="login-screen">
    <div class="login-card">
      <h1>Chores</h1>
      <p class="sub">Sign in to your house board.</p>
      <label class="fld">
        <span>Server URL</span>
        <input id="apiBase" placeholder="https://your-mac.trycloudflare.com" />
        <small>Leave blank if you opened this straight from the server.</small>
      </label>
      <label class="fld">
        <span>House password</span>
        <input id="password" type="password" placeholder="••••••••" />
      </label>
      <button id="loginBtn" class="btn btn-primary">Enter</button>
      <p id="loginError" class="error"></p>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="title-wrap">
        <h1 class="app-title">Chores</h1>
        <span id="weekLabel" class="week"></span>
      </div>
      <div class="top-actions">
        <span id="channelBadge" class="chan" title="messaging channel"></span>
        <button id="settingsBtn" class="icon-btn" title="Settings" aria-label="Settings">⚙</button>
        <button id="logoutBtn" class="icon-btn" title="Sign out" aria-label="Sign out">⏻</button>
      </div>
    </header>

    <main id="cards" class="cards"></main>

    <section id="choreGuide" class="chore-guide"></section>

    <!-- Settings drawer -->
    <div id="drawerScrim" class="scrim hidden"></div>
    <aside id="drawer" class="drawer hidden"></aside>

    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
